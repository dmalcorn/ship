server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the Railway API service
    location /api/ {
        proxy_pass https://api-production-4508.up.railway.app;
        proxy_set_header Host api-production-4508.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Proxy collaboration WebSocket to the API service
    location /collaboration/ {
        proxy_pass https://api-production-4508.up.railway.app;
        proxy_set_header Host api-production-4508.up.railway.app;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Proxy SSE events to the API service
    location /events/ {
        proxy_pass https://api-production-4508.up.railway.app;
        proxy_set_header Host api-production-4508.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Serve React SPA — all non-API routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
