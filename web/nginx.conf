server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the API service (same-origin to avoid cross-origin cookie blocking)
    location /api/ {
        proxy_pass http://api.railway.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Railway terminates TLS at the edge — tell the API the request is HTTPS
        # so express-session sets Secure cookies correctly
        proxy_set_header X-Forwarded-Proto https;
    }

    # Proxy WebSocket collaboration traffic
    location /collaboration/ {
        proxy_pass http://api.railway.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
