<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">FleetGraph — Graph Architecture</text>

  <!-- ==================== PROACTIVE GRAPH (left) ==================== -->
  <rect x="20" y="60" width="570" height="740" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="305" y="92" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="600">Proactive Health-Check Graph</text>
  <text x="305" y="112" text-anchor="middle" fill="#94a3b8" font-size="11">3-minute cron · all programs · no user input</text>

  <!-- START -->
  <circle cx="305" cy="145" r="14" fill="#334155" stroke="#64748b" stroke-width="2"/>
  <text x="305" y="150" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">START</text>

  <!-- Arrow START → resolve_context -->
  <line x1="305" y1="159" x2="305" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- resolve_context -->
  <rect x="215" y="178" width="180" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="305" y="200" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">resolve_context</text>

  <!-- Fan-out arrows -->
  <line x1="245" y1="212" x2="110" y2="248" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="275" y1="212" x2="225" y2="248" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="335" y1="212" x2="375" y2="248" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="365" y1="212" x2="490" y2="248" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Parallel fetch nodes -->
  <rect x="40" y="250" width="130" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="105" y="272" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="500">fetch_issues</text>

  <rect x="180" y="250" width="130" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="245" y="272" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="500">fetch_sprint</text>

  <rect x="320" y="250" width="130" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="385" y="272" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="500">fetch_team</text>

  <rect x="460" y="250" width="130" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="525" y="272" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="500">fetch_standups</text>

  <!-- Parallel label -->
  <text x="305" y="244" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">parallel fan-out</text>

  <!-- Converge arrows to enrich -->
  <line x1="105" y1="284" x2="245" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="245" y1="284" x2="275" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="385" y1="284" x2="335" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="525" y1="284" x2="365" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- enrich_associations -->
  <rect x="215" y="320" width="180" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="305" y="342" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">enrich_associations</text>

  <!-- Arrow → change_detection -->
  <line x1="305" y1="354" x2="305" y2="375" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- change_detection -->
  <rect x="215" y="378" width="180" height="34" rx="6" fill="#3b1f5e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="305" y="400" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="500">change_detection</text>

  <!-- Conditional diamond label -->
  <text x="305" y="425" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="600">data changed?</text>

  <!-- Branch: unchanged → data_unchanged (left) -->
  <line x1="235" y1="412" x2="110" y2="450" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="148" y="435" text-anchor="middle" fill="#22c55e" font-size="9">no</text>

  <rect x="40" y="452" width="140" height="34" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="110" y="474" text-anchor="middle" fill="#86efac" font-size="11" font-weight="500">data_unchanged</text>

  <!-- data_unchanged → END -->
  <line x1="110" y1="486" x2="110" y2="510" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <circle cx="110" cy="524" r="12" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="528" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">END</text>

  <!-- Branch: changed → analyze_health (right/down) -->
  <line x1="375" y1="412" x2="375" y2="450" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-amber)"/>
  <text x="390" y="438" fill="#f59e0b" font-size="9">yes</text>

  <!-- analyze_health -->
  <rect x="265" y="455" width="180" height="34" rx="6" fill="#713f12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="355" y="477" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="500">analyze_health</text>
  <text x="305" y="435" text-anchor="middle" fill="#f59e0b" font-size="8">⚡ LLM call</text>

  <!-- Conditional routing from analyze_health -->
  <text x="355" y="505" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">result?</text>

  <!-- Branch: clean → log_clean_run -->
  <line x1="285" y1="489" x2="110" y2="560" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="180" y="530" text-anchor="middle" fill="#22c55e" font-size="9">clean</text>

  <rect x="40" y="562" width="140" height="34" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="110" y="584" text-anchor="middle" fill="#86efac" font-size="11" font-weight="500">log_clean_run</text>

  <line x1="110" y1="596" x2="110" y2="618" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <circle cx="110" cy="632" r="12" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="636" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">END</text>

  <!-- Branch: findings → propose_actions -->
  <line x1="355" y1="509" x2="355" y2="545" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-amber)"/>
  <text x="372" y="532" fill="#f59e0b" font-size="9">findings</text>

  <rect x="265" y="548" width="180" height="34" rx="6" fill="#713f12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="355" y="570" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="500">propose_actions</text>

  <!-- → confirmation_gate -->
  <line x1="355" y1="582" x2="355" y2="610" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <rect x="255" y="612" width="200" height="38" rx="6" fill="#7c2d12" stroke="#f97316" stroke-width="2"/>
  <text x="355" y="630" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="600">confirmation_gate</text>
  <text x="355" y="644" text-anchor="middle" fill="#fdba74" font-size="9">⏸ HITL interrupt</text>

  <line x1="355" y1="650" x2="355" y2="672" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <circle cx="355" cy="686" r="12" fill="#713f12" stroke="#f59e0b" stroke-width="2"/>
  <text x="355" y="690" text-anchor="middle" fill="#fde68a" font-size="9" font-weight="600">END</text>

  <!-- Branch: errors → graceful_degrade -->
  <line x1="445" y1="489" x2="510" y2="560" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="495" y="530" text-anchor="middle" fill="#ef4444" font-size="9">errors</text>

  <rect x="455" y="562" width="140" height="34" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="525" y="584" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="500">graceful_degrade</text>

  <line x1="525" y1="596" x2="525" y2="618" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <circle cx="525" cy="632" r="12" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="525" y="636" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">END</text>

  <!-- ==================== ON-DEMAND GRAPH (right) ==================== -->
  <rect x="610" y="60" width="570" height="740" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="895" y="92" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="600">On-Demand Chat Graph</text>
  <text x="895" y="112" text-anchor="middle" fill="#94a3b8" font-size="11">HTTP triggered · document-scoped · user question</text>

  <!-- START -->
  <circle cx="895" cy="145" r="14" fill="#334155" stroke="#64748b" stroke-width="2"/>
  <text x="895" y="150" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">START</text>

  <!-- Arrow START → resolve_context -->
  <line x1="895" y1="159" x2="895" y2="185" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- resolve_context (with doc context) -->
  <rect x="795" y="188" width="200" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="895" y="210" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="500">resolve_context</text>
  <text x="895" y="225" text-anchor="middle" fill="#60a5fa" font-size="9">+ fetch document &amp; associations</text>

  <!-- Fan-out arrows (3 nodes) -->
  <line x1="835" y1="232" x2="735" y2="268" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="895" y1="232" x2="895" y2="268" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="955" y1="232" x2="1055" y2="268" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Parallel fetch nodes (3) -->
  <rect x="660" y="270" width="150" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="735" y="292" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="500">fetch_issues</text>

  <rect x="820" y="270" width="150" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="895" y="292" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="500">fetch_sprint</text>

  <rect x="980" y="270" width="150" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1055" y="292" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="500">fetch_team</text>

  <!-- Parallel label -->
  <text x="895" y="264" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">parallel fan-out (3 nodes)</text>

  <!-- No fetch_standups callout -->
  <text x="895" y="322" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">no fetch_standups in on-demand</text>

  <!-- Converge arrows -->
  <line x1="735" y1="304" x2="845" y2="348" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="895" y1="304" x2="895" y2="348" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1055" y1="304" x2="945" y2="348" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- analyze_context (different from proactive) -->
  <rect x="795" y="350" width="200" height="44" rx="6" fill="#713f12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="895" y="372" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="500">analyze_context</text>
  <text x="895" y="387" text-anchor="middle" fill="#fbbf24" font-size="9">⚡ LLM call + user question</text>

  <!-- No change_detection callout -->
  <rect x="660" y="355" width="120" height="30" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="720" y="374" text-anchor="middle" fill="#64748b" font-size="9">no change_detection</text>
  <text x="720" y="383" text-anchor="middle" fill="#64748b" font-size="8">no enrich_associations</text>

  <!-- Conditional routing -->
  <text x="895" y="412" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">result?</text>

  <!-- Branch: clean → log_clean_run -->
  <line x1="825" y1="394" x2="735" y2="445" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="762" y="425" text-anchor="middle" fill="#22c55e" font-size="9">clean</text>

  <rect x="660" y="448" width="150" height="34" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="735" y="470" text-anchor="middle" fill="#86efac" font-size="11" font-weight="500">log_clean_run</text>

  <line x1="735" y1="482" x2="735" y2="510" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <circle cx="735" cy="524" r="12" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="735" y="528" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">END</text>

  <!-- Branch: findings → propose_actions -->
  <line x1="895" y1="415" x2="895" y2="445" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-amber)"/>
  <text x="915" y="436" fill="#f59e0b" font-size="9">findings</text>

  <rect x="805" y="448" width="180" height="34" rx="6" fill="#713f12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="895" y="470" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="500">propose_actions</text>

  <!-- → confirmation_gate -->
  <line x1="895" y1="482" x2="895" y2="515" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <rect x="795" y="518" width="200" height="38" rx="6" fill="#7c2d12" stroke="#f97316" stroke-width="2"/>
  <text x="895" y="536" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="600">confirmation_gate</text>
  <text x="895" y="550" text-anchor="middle" fill="#fdba74" font-size="9">⏸ HITL interrupt</text>

  <line x1="895" y1="556" x2="895" y2="580" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <circle cx="895" cy="594" r="12" fill="#713f12" stroke="#f59e0b" stroke-width="2"/>
  <text x="895" y="598" text-anchor="middle" fill="#fde68a" font-size="9" font-weight="600">END</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="660" y="640" width="500" height="140" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="910" y="665" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">Legend</text>

  <!-- Fetch node -->
  <rect x="680" y="680" width="80" height="20" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="770" y="695" fill="#94a3b8" font-size="10">Data fetch node</text>

  <!-- Reasoning node -->
  <rect x="680" y="708" width="80" height="20" rx="4" fill="#713f12" stroke="#f59e0b" stroke-width="1"/>
  <text x="770" y="723" fill="#94a3b8" font-size="10">LLM reasoning node</text>

  <!-- HITL node -->
  <rect x="680" y="736" width="80" height="20" rx="4" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="770" y="751" fill="#94a3b8" font-size="10">Human-in-the-loop gate</text>

  <!-- Gate node -->
  <rect x="900" y="680" width="80" height="20" rx="4" fill="#3b1f5e" stroke="#a855f7" stroke-width="1"/>
  <text x="990" y="695" fill="#94a3b8" font-size="10">Conditional gate</text>

  <!-- Terminal node -->
  <rect x="900" y="708" width="80" height="20" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="990" y="723" fill="#94a3b8" font-size="10">Terminal / clean path</text>

  <!-- Error node -->
  <rect x="900" y="736" width="80" height="20" rx="4" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="990" y="751" fill="#94a3b8" font-size="10">Error / degrade path</text>

  <!-- Key differences callout -->
  <rect x="630" y="625" width="550" height="18" rx="4" fill="none"/>
  <text x="895" y="637" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">Proactive: cron-triggered, 4 fetches, change_detection gate, enrich_associations, graceful_degrade · On-demand: user-triggered, 3 fetches, document-scoped</text>
</svg>
